<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Turon Kafesi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!--
      Signal readiness and expand the viewport as early as possible.
      requestFullscreen() and disableVerticalSwipes() are intentionally
      NOT called here — they are called once by initializeTelegramMiniApp()
      in the JS bundle with a cooldown guard. Calling requestFullscreen()
      here AND in the bundle causes two back-to-back viewport transitions
      on iOS which permanently blocks touch input (WKWebView touch freeze bug).
    -->
    <script>
      (function () {
        var tg = window.Telegram && window.Telegram.WebApp;
        if (!tg) return;
        var platform = (tg.platform || '').toLowerCase();
        var isMobile = platform === 'ios' || platform === 'android' || platform === 'android_x';
        document.documentElement.dataset.tgClient = isMobile ? 'mobile' : 'desktop';
        try { tg.ready(); } catch (e) {}
        if (isMobile) {
          try { tg.expand(); } catch (e) {}
        } else {
          try { tg.exitFullscreen && tg.exitFullscreen(); } catch (e) {}
        }
      })();
    </script>
    <!--
      Match the loading screen background so there is NEVER a white flash
      between HTML parse and React's first paint.
    -->
    <style>
      html, body { margin: 0; padding: 0; background: #0a0d18; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
